    <script>
      // Global error handler to catch and ignore the "Cannot set property fetch of #<Window>" error
      // This must run as early as possible to catch errors from early-loading scripts.
      (function() {
        // 1. Try to redefine the property to prevent the error from occurring
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Attempted to overwrite window.fetch ignored');
              },
              configurable: true
            });
          }
        } catch (e) {
          // If we can't redefine it, we just rely on the error handlers.
        }

        // 2. Use window.onerror for standard error suppression
        var oldOnError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          var msg = message || (error && error.message);
          if (msg && typeof msg === 'string' && msg.indexOf('Cannot set property fetch of #<Window>') !== -1) {
            console.warn('Caught and ignored known fetch property error via window.onerror:', msg);
            return true; // Suppress console error
          }
          if (oldOnError) return oldOnError.apply(this, arguments);
        };

        // 3. Use addEventListener for capturing phase and promises
        var errorHandler = function(event) {
          var message = event.message || (event.error && event.error.message);
          if (message && typeof message === 'string' && message.indexOf('Cannot set property fetch of #<Window>') !== -1) {
            console.warn('Caught and ignored known fetch property error via addEventListener:', message);
            if (event.preventDefault) event.preventDefault();
            if (event.stopPropagation) event.stopPropagation();
            return true;
          }
        };
        window.addEventListener('error', errorHandler, true);
        window.addEventListener('unhandledrejection', function(event) {
          var message = event.reason && (event.reason.message || event.reason);
          if (message && typeof message === 'string' && message.indexOf('Cannot set property fetch of #<Window>') !== -1) {
            console.warn('Caught and ignored known fetch property promise rejection:', message);
            if (event.preventDefault) event.preventDefault();
            if (event.stopPropagation) event.stopPropagation();
          }
        }, true);
      })();
    </script>
